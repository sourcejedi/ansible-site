- name: Check OS family is Debian
  assert:
    that: "ansible_os_family == 'Debian'"

# Hum.  Classic Debian installer just uses /etc/apt/apt.conf for this.
- name: Configure apt proxy
  template:
    src: apt.conf.d/02proxy.j2
    dest: /etc/apt/apt.conf.d/02proxy
  register: proxy

- name: Configure apt proxy autodetection (squid-deb-proxy-client)
  package:
    name: squid-deb-proxy-client
    state: "{{ 'present' if repos_apt_autodetect_apt_proxy else 'absent' }}"

- name: Check for deb822-format sources
  set_fact:
    deb822: "{{ lookup('fileglob', repos_apt ~ '.sources') | length > 0 }}"

- name: Clear sources.list in favour of sources.list.d (deb822 format)
  copy:
    src: "empty.sources.list"
    dest: "/etc/apt/sources.list"
  when: deb822

- name: Configure apt sources using deb22 format
  copy:
    src: "{{ repos_apt }}.sources"
    dest: "/etc/apt/sources.list.d/{{ ansible_distribution.lower() }}.sources"
  register: sources
  when: deb822

- name: Configure apt sources using sources.list
  copy:
    src: "{{ repos_apt }}.sources.list"
    dest: "/etc/apt/sources.list"
  register: sources
  when: not deb822


# This test is slow, only bother when changed.
# (In which case, the next use of apt would have had to do it anyway).
# Do not defer this, as other roles may add drop-in configs.
- name: Test "apt-get update"
  command: apt-get update
  when: proxy.changed or sources.changed
  register: update
  failed_when: update.rc != 0
