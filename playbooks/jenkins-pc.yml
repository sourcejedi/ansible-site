# Ubuntu aspires to "No open ports".  Nevertheless, I suggest *always*
# initializing systems on a firewalled network.
# (E.g. standard home router config.  Sucks if you don't have a router.)
# Once this role is run, a firewall will be installed, and will allow the SSH port.

- hosts: jenkins-laptop drystone
  roles:
    - repos_apt

    - sourcejedi.etckeeper

    - users

    - sourcejedi.systemd_journal

    # ubuntu uses apport
    #- systemd-coredump

    - role: sourcejedi.firewalld
      firewalld__services:
       - dhcpv6-client
       - mdns
       - ssh

    - sourcejedi.disable_unwanted_servers
    - sourcejedi.cups

    - sourcejedi.atop
    - smartd

    - openssh-server

    - packages-cli-basics
    - jpegcheck

    - sourcejedi.google_chrome
    - element_desktop

  tasks:
    - name: "Install Thunderbird (snap)"
      snap:
        name: thunderbird
        state: present
      tags: apps

    - name: "Install KeePassXC (apt)"
      package:
        name: keepassxc
        state: present
      tags: apps

- import_playbook: jenkins-laptop.yml
- import_playbook: jenkins-desktop.yml
