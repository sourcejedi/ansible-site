# Ubuntu aspires to "No open ports".  Nevertheless, I suggest *always*
# initializing systems on a firewalled network.
# (E.g. standard home router config.  Sucks if you don't have a router.)
# Once this role is run, a firewall will be installed, and will allow the SSH port.

- hosts: jenkins-laptop
  roles:
    - role: repos_apt
      repos_apt: ubuntu-24.04

    - sourcejedi.etckeeper

    - users

    - sourcejedi.systemd_journal

    # ubuntu uses apport
    #- systemd-coredump

    - role: sourcejedi.firewalld
      firewalld__services:
       - dhcpv6-client
       - mdns
       - ssh

    - sourcejedi.disable_unwanted_servers
    - sourcejedi.cups

    - sourcejedi.atop
    - smartd

    - openssh-server

    - packages-cli-basics
    - packages-gui

    - element_desktop
  tasks:
    - name: "Install apps (apt)"
      package:
        name:
          - keepassxc
        state: present
      tags: apps

    - name: "Install Zoom (video conference) - Unofficial snap package"
      snap:
        name: zoom-client
      tags: zoom
