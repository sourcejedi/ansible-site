# Ubuntu 24.04

- hosts: alan-laptop-2023
  roles:
    - sourcejedi.etckeeper

    - sourcejedi.atop

    - role: sourcejedi.firewalld
      firewalld__services:
        - dhcpv6-client
        - mdns
        - transmission-client
    - sourcejedi.disable_unwanted_servers
    - sourcejedi.cups

    - flatpak
    - sourcejedi.google_chrome
    - element_desktop
    - jpegcheck

    - sourcejedi.libvirt_nss

    - ansible_ubuntu_ppa

    # Something is crashing.  Get the good stuff.
    # (This is actually compatible with apport nowadays,
    #  due to an update in Ubuntu 24.04).
    - systemd-coredump
  tasks:
    - name: flatpak installs
      flatpak:
        name: "{{ item }}"
        state: present
      with_items:
        - org.keepassxc.KeePassXC
      tags: flatpak
